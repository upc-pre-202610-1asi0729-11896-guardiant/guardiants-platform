# Application name
spring.application.name=GOD's Tracker Platform

# Default to development when no explicit profile is provided
spring.profiles.default=dev

# Shared Spring DataSource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Naming strategy: converts entity names to snake_case + pluralized table names
# e.g. TelemetryPoint -> telemetry_points | VehicleLoan -> vehicle_loans
spring.jpa.hibernate.naming.physical-strategy=com.guardiants.platform.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Documentation metadata (read from pom.xml at build time)
documentation.application.description=@project.description@
documentation.application.version=@project.version@

# JWT configuration
authorization.jwt.secret=WriteHereYourSecretStringForTokenSigningCredentials
authorization.jwt.expiration.days=7

# i18n message bundles
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# Flyway (disabled by default — DDL managed by Hibernate in dev)
spring.flyway.enabled=false